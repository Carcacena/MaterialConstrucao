<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Clientes</title>
  
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4caf50);
            color: white;
            min-height: 100vh;
            padding: 30px 20px;
            margin: 0;
            user-select: none;
        }
        .container-sistema {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .titulo-pagina { width: 100%; margin-bottom: 20px; }
        .coluna-formulario { flex: 1; min-width: 320px; }
        .coluna-tabela { flex: 2; min-width: 450px; }
        .box-custom {
            background: rgba(0, 0, 0, 0.45);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }
        h2, h4 { color: white; margin-top: 0; margin-bottom: 15px; }
        .campo-grupo { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 14px; }
        .form-control {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            border-color: #ff9800;
        }
        .btn-salvar-form {
            width: 100%; background: #ff9800; border: none; padding: 12px; 
            font-weight: bold; border-radius: 6px; color: white; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; font-size: 13px;
        }
        .btn-salvar-form:hover { filter: brightness(1.1); }
        .tabela-container-scroll { max-height: 350px; overflow-y: auto; border-radius: 4px; }
        .table-custom { width: 100%; border-collapse: collapse; color: white; text-align: left; }
        .table-custom th {
            background: rgba(0, 0, 0, 0.3); color: #ff9800; padding: 12px 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2); font-size: 14px;
        }
        .table-custom td { padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
        .table-custom tbody tr { cursor: pointer; }
        .table-custom tbody tr:hover { background: rgba(255, 255, 255, 0.05); }
        .table-custom tr.selecionado td {
            background: rgba(255, 152, 0, 0.3) !important; color: white !important;
            font-weight: bold; border-top: 1px solid #ff9800; border-bottom: 1px solid #ff9800;
        }
        
        /* 👑 QUADRO VERTICAL FLUTUANTE ARRASTÁVEL COM BORDA DUPLA */
        .painel-flutuante {
            position: fixed; top: 220px; right: 40px; width: 145px;
            background: rgba(15, 25, 35, 0.95); border: 2px solid #ff9800; 
            outline: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px;
            padding: 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.7); z-index: 2000; box-sizing: border-box;
        }
        .painel-header {
            padding-bottom: 8px; cursor: move; text-align: center; color: #ff9800;
            border-bottom: 1px dashed rgba(255, 152, 0, 0.4); margin-bottom: 12px;
            font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .painel-corpo { display: flex; flex-direction: column; gap: 8px; }
        .btn-menu-vertical {
            width: 100%; padding: 9px 0; border: none; border-radius: 4px; color: white;
            font-weight: bold; font-size: 12px; text-transform: uppercase; text-align: center;
            transition: 0.15s ease-in-out; cursor: pointer; letter-spacing: 0.5px;
        }
        .btn-menu-vertical:hover { transform: scale(1.03); filter: brightness(1.15); }
        .btn-incluir { background: #27ae60; }
        .btn-alterar { background: #2980b9; }
        .btn-excluir { background: #c0392b; }
        .btn-voltar  { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container-sistema">
        <div class="titulo-pagina">
            <h2 style="margin: 0;">🌿 Gerenciamento de Clientes</h2>
        </div>

        <!-- Formulário de Entrada -->
        <div class="coluna-formulario">
            <div class="box-custom">
                <h4 id="tituloFormulario">Cadastrar Cliente</h4>
                <form id="formCliente">
                    <div class="campo-grupo">
                        <label for="nome" class="form-label">Nome do Cliente</label>
                        <input type="text" class="form-control" id="nome" required placeholder="Ex: João da Silva">
                    </div>
                    <div class="campo-grupo" style="margin-bottom: 20px;">
                        <label for="endereco" class="form-label">Endereço</label>
                        <input type="text" class="form-control" id="endereco" required placeholder="Ex: Rua das Palmeiras, 450">
                    </div>
                    <button type="submit" class="btn-salvar-form" id="btnSalvar">Salvar Cliente</button>
                </form>
            </div>
        </div>

        <!-- Listagem de Clientes -->
        <div class="coluna-tabela">
            <div class="box-custom">
                <h4>Clientes Cadastrados</h4>
                <div class="tabela-container-scroll">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th style="width: 15%;">ID</th>
                                <th style="width: 45%;">Nome</th>
                                <th style="width: 40%;">Endereço</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaClientes">
                            <!-- Preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
	
	<!-- 🛠️ QUADRO VERTICAL DE AÇÕES COM ATALHOS SUBLINHADOS -->
	    <div id="meuPainelFlutuante" class="painel-flutuante">
	        <div id="meuPainelHeader" class="painel-header">::: MENU :::</div>
	        <div class="painel-corpo">
	            <button class="btn-menu-vertical btn-incluir" onclick="acionarIncluir()"><u>I</u>ncluir</button>
	            <button class="btn-menu-vertical btn-alterar" onclick="acionarAlterar()"><u>A</u>lterar</button>
	            <button class="btn-menu-vertical btn-excluir" onclick="acionarExcluir()"><u>E</u>xcluir</button>
	            <button class="btn-menu-vertical btn-voltar" onclick="window.location.href='menu.html'"><u>V</u>oltar</button>
	        </div>
	    </div>
    
    <!-- Engenharia de movimentação do painel -->
    <script>
        const painel = document.getElementById("meuPainelFlutuante");
        const header = document.getElementById("meuPainelHeader");
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (header) { header.onmousedown = iniciarArrasto; }
        function iniciarArrasto(e) {
            e = e || window.event; e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = pararArrasto; document.onmousemove = arrastandoPainel;
        }
        function arrastandoPainel(e) {
            e = e || window.event; e.preventDefault();
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            painel.style.top = (painel.offsetTop - pos2) + "px";
            painel.style.left = (painel.offsetLeft - pos1) + "px";
            painel.style.right = "auto"; 
        }
        function pararArrasto() { document.onmouseup = null; document.onmousemove = null; }
    </script>
    <script src="appCliente.js"></script>
</body>
</html>
